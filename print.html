<!DOCTYPE html>
<!-- ProCV PDF Print Helper -->
<!-- This page receives CV data via postMessage or URL hash and renders it for printing -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>ProCV — Print Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Lato:wght@300;400;700&family=Merriweather:wght@400;700&family=Source+Serif+4:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=Nunito:wght@400;600;700&family=Raleway:wght@400;600;700&family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; font-size: 11pt; }
    .print-toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1C1D24; color: #fff;
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      font-family: 'DM Sans', sans-serif;
    }
    .print-toolbar h3 { font-size: 0.9rem; font-weight: 600; }
    .print-toolbar p { font-size: 0.78rem; opacity: 0.6; }
    .print-actions { display: flex; gap: 10px; }
    .btn-print { background: #E8472A; color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; font-size: 0.88rem; }
    .btn-close { background: rgba(255,255,255,0.1); color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-size: 0.88rem; }
    .page-wrap { padding: 80px 0 40px; display: flex; justify-content: center; background: #888; min-height: 100vh; }
    #cv-print-area { background: #fff; width: 794px; min-height: 1123px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }

    @media print {
      .print-toolbar { display: none !important; }
      .page-wrap { background: #fff; padding: 0; }
      #cv-print-area { box-shadow: none; width: 100%; }
      @page { size: A4; margin: 0; }
    }
  </style>
</head>
<body>
  <div class="print-toolbar">
    <div>
      <h3>🖨️ ProCV — Print / Save as PDF</h3>
      <p>In the print dialog, set Destination to "Save as PDF" and Margins to "None"</p>
    </div>
    <div class="print-actions">
      <button class="btn-close" onclick="window.close()">✕ Close</button>
      <button class="btn-print" onclick="window.print()">🖨️ Print / Save PDF</button>
    </div>
  </div>
  <div class="page-wrap">
    <div id="cv-print-area">
      <div style="display:flex;align-items:center;justify-content:center;height:400px;color:#888;flex-direction:column;gap:12px">
        <div style="font-size:2rem">⏳</div>
        <p style="font-family:'DM Sans',sans-serif">Loading your CV...</p>
      </div>
    </div>
  </div>

  <script>
    // Receive the CV HTML from the opener window
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'cv-html') {
        document.getElementById('cv-print-area').outerHTML = e.data.html;
        // Auto print after a short delay to let fonts load
        setTimeout(() => window.print(), 1200);
      }
    });

    // Also try reading from localStorage as fallback
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('procv_print_html');
      if (saved) {
        try {
          const wrapper = document.getElementById('cv-print-area');
          if (wrapper) wrapper.innerHTML = saved;
          localStorage.removeItem('procv_print_html');
          setTimeout(() => window.print(), 1200);
        } catch(e) {}
      }
    });
  </script>
</body>
</html>
